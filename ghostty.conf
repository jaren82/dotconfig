# Ghostty Configuration (based on Alacritty config)

# Font settings
font-family = JetBrainsMono Nerd Font
font-style = Thin
font-style-bold = Bold
font-style-italic = Italic
font-size = 11

# Window settings
window-padding-x = 2
window-padding-y = 2

# Theme - iTerm 2 default theme colors
background = 000000
foreground = c7c7c7

# Normal colors
palette = 0=#000000
palette = 1=#c91b00
palette = 2=#00c200
palette = 3=#c7c400
palette = 4=#0225c7
palette = 5=#c930c7
palette = 6=#00c5c7
palette = 7=#c7c7c7

# Bright colors
palette = 8=#676767
palette = 9=#ff6d67
palette = 10=#5ff967
palette = 11=#fefb67
palette = 12=#6871ff
palette = 13=#ff76ff
palette = 14=#5ffdff
palette = 15=#fffeff

# Shell settings
shell-integration = zsh
shell-integration-features = cursor,sudo,title
command = /bin/zsh -c "export PATH=/opt/homebrew/bin:$PATH && (tmux attach -t ' ╣[-_-]╠  ' 2>/dev/null || tmux new -s ' ╣[-_-]╠  ') && tmux source-file ~/.config/.tmux.conf"

# Scrollback
scrollback-limit = 100000

# Cursor
cursor-style = block

# Key bindings for basic operations
keybind = cmd+v=paste_from_clipboard
keybind = cmd+c=copy_to_clipboard
keybind = cmd+q=quit
keybind = cmd+n=new_window
keybind = cmd+enter=toggle_fullscreen

# Tmux key bindings (leader key is control-b)
keybind = cmd+shift+w=text:\x02w
keybind = cmd+w=text:\x02&
keybind = cmd+t=text:\x02c
keybind = cmd+shift+]=text:\x02n
keybind = cmd+shift+[=text:\x02p
keybind = cmd+]=text:\x02o
keybind = cmd+[=text:\x02a
keybind = cmd+f=text:\x02/

# Alt/Option key mappings
keybind = alt+a=text:\x1ba
keybind = alt+b=text:\x1bb
keybind = alt+c=text:\x1bc
keybind = alt+d=text:\x1bd
keybind = alt+e=text:\x1be
keybind = alt+f=text:\x1bf
keybind = alt+g=text:\x1bg
keybind = alt+h=text:\x1bh
keybind = alt+i=text:\x1bi
keybind = alt+j=text:\x1bj
keybind = alt+k=text:\x1bk
keybind = alt+l=text:\x1bl
keybind = alt+m=text:\x1bm
keybind = alt+n=text:\x1bn
keybind = alt+o=text:\x1bo
keybind = alt+p=text:\x1bp
keybind = alt+q=text:\x1bq
keybind = alt+r=text:\x1br
keybind = alt+s=text:\x1bs
keybind = alt+t=text:\x1bt
keybind = alt+u=text:\x1bu
keybind = alt+v=text:\x1bv
keybind = alt+w=text:\x1bw
keybind = alt+x=text:\x1bx
keybind = alt+y=text:\x1by
keybind = alt+z=text:\x1bz

# Alt+Shift mappings
keybind = alt+shift+a=text:\x1bA
keybind = alt+shift+b=text:\x1bB
keybind = alt+shift+c=text:\x1bC
keybind = alt+shift+d=text:\x1bD
keybind = alt+shift+e=text:\x1bE
keybind = alt+shift+f=text:\x1bF
keybind = alt+shift+g=text:\x1bG
keybind = alt+shift+h=text:\x1bH
keybind = alt+shift+i=text:\x1bI
keybind = alt+shift+j=text:\x1bJ
keybind = alt+shift+k=text:\x1bK
keybind = alt+shift+l=text:\x1bL
keybind = alt+shift+m=text:\x1bM
keybind = alt+shift+n=text:\x1bN
keybind = alt+shift+o=text:\x1bO
keybind = alt+shift+p=text:\x1bP
keybind = alt+shift+q=text:\x1bQ
keybind = alt+shift+r=text:\x1bR
keybind = alt+shift+s=text:\x1bS
keybind = alt+shift+t=text:\x1bT
keybind = alt+shift+u=text:\x1bU
keybind = alt+shift+v=text:\x1bV
keybind = alt+shift+w=text:\x1bW
keybind = alt+shift+x=text:\x1bX
keybind = alt+shift+y=text:\x1bY
keybind = alt+shift+z=text:\x1bZ

# Alt+Number mappings
keybind = alt+1=text:\x1b1
keybind = alt+2=text:\x1b2
keybind = alt+3=text:\x1b3
keybind = alt+4=text:\x1b4
keybind = alt+5=text:\x1b5
keybind = alt+6=text:\x1b6
keybind = alt+7=text:\x1b7
keybind = alt+8=text:\x1b8
keybind = alt+9=text:\x1b9
keybind = alt+0=text:\x1b0

# Special character mappings
keybind = ctrl+space=text:\x00
keybind = alt+`=text:\x1b`
keybind = alt+shift+`=text:\x1b~
keybind = alt+period=text:\x1b.
keybind = alt+shift+eight=text:\x1b*
keybind = alt+shift+three=text:\x1b#
keybind = alt+shift+period=text:\x1b>
keybind = alt+shift+comma=text:\x1b<
keybind = alt+shift+minus=text:\x1b_
keybind = alt+shift+five=text:\x1b%
keybind = alt+shift+six=text:\x1b^
keybind = alt+backslash=text:\x1b\\
keybind = alt+slash=text:\x1b/
keybind = alt+shift+backslash=text:\x1b|
keybind = alt+enter=text:\x1b\x0D

# Miscellaneous settings
bold-is-bright = true