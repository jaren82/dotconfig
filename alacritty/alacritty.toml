[general]
live_config_reload = true

[terminal]

[colors.bright]
black = "0x676767"
blue = "0x6871ff"
cyan = "0x5ffdff"
green = "0x5ff967"
magenta = "0xff76ff"
red = "0xff6d67"
white = "0xfffeff"
yellow = "0xfefb67"

[colors.normal]
black = "0x000000"
blue = "0x0225c7"
cyan = "0x00c5c7"
green = "0x00c200"
magenta = "0xc930c7"
red = "0xc91b00"
white = "0xc7c7c7"
yellow = "0xc7c400"

[colors.primary]
background = "0x000000"
foreground = "0xc7c7c7"

[font]
size = 11

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.glyph_offset]
x = 0
y = 0

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Thin"

[font.offset]
x = 1
y = 1

[scrolling]
history = 100000
multiplier = 10

[terminal.shell]
args = ["--login", "-c", "tmux -f ~/.config/.tmux.conf attach -t 'howard' || tmux -f ~/.config/.tmux.conf new -s 'howard'"]
program = "/bin/zsh"

[window.padding]
x = 2
y = 2

